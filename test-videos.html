<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Test Videos</title>
<style>
:root {
  --bg: #737373;
  --panel: #d7d7d7;
  --panel-strong: #c8c8c8;
  --field: #eeeeee;
  --ink: #171717;
  --muted: #4c4c4c;
  --line: #a8a8a8;
  --accent: #1f5f99;
  --accent-weak: #c7d7e6;
  --good: #17624f;
  --warn: #7a5300;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input,
select {
  font: inherit;
}

.shell {
  height: 100vh;
  display: grid;
  grid-template-columns: minmax(260px, 330px) minmax(0, 1fr);
}

.sidebar {
  min-width: 0;
  padding: 8px 10px;
  border-right: 1px solid var(--line);
  background: var(--panel);
  display: grid;
  grid-template-rows: auto auto auto auto minmax(0, 1fr);
  gap: 8px;
  align-content: start;
  overflow: auto;
}

.main {
  min-width: 0;
  min-height: 0;
  padding: 8px;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 8px;
  overflow: hidden;
}

.title {
  margin: 0;
  font-size: 16px;
  line-height: 1.1;
  letter-spacing: 0;
  white-space: nowrap;
}

.subtitle {
  display: none;
  margin: 0;
  color: var(--muted);
}

.search {
  width: 100%;
  height: 30px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--field);
  color: var(--ink);
  outline: none;
}

.search:focus {
  border-color: var(--accent);
}

.controls {
  display: grid;
  gap: 7px;
  margin: 0;
}

.control {
  display: grid;
  gap: 3px;
}

.control label {
  color: var(--muted);
  font-size: 10px;
  font-weight: 650;
  text-transform: uppercase;
}

.select {
  width: 100%;
  height: 28px;
  padding: 0 6px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--field);
  color: var(--ink);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.chip {
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--field);
  color: var(--ink);
  padding: 4px 8px;
  cursor: pointer;
}

.chip[aria-pressed="true"] {
  border-color: var(--accent);
  background: var(--accent-weak);
  color: #063b73;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 4px;
  min-width: 0;
}

.metric {
  padding: 3px 6px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--panel-strong);
}

.metric strong {
  display: block;
  font-size: 15px;
  line-height: 1.1;
}

.metric span {
  color: var(--muted);
  font-size: 10px;
}

.status {
  display: none;
  padding: 4px 6px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--panel-strong);
  color: var(--muted);
  font-size: 11px;
  overflow-wrap: anywhere;
  max-width: 420px;
}

.status.ok {
  display: none;
  color: var(--good);
}

.status.warn {
  display: block;
  color: var(--warn);
}

.preview {
  position: sticky;
  top: 0;
  min-width: 0;
  min-height: 0;
  z-index: 2;
  display: grid;
  grid-template-rows: auto auto;
  gap: 8px;
  background: var(--bg);
}

.player,
.details,
.table-wrap {
  border: 1px solid var(--line);
  background: var(--panel);
}

.player {
  overflow: hidden;
  background: #686868;
}

video {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #707070;
}

.details {
  padding: 8px;
  min-width: 0;
  overflow: auto;
}

.details h2 {
  margin: 0 0 6px;
  font-size: 13px;
  overflow-wrap: anywhere;
}

.details-head {
  display: flex;
  gap: 8px;
  align-items: start;
  justify-content: space-between;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tag {
  padding: 2px 5px;
  border-radius: 0;
  background: var(--panel-strong);
  color: #333333;
  font-size: 11px;
}

.tag.hdr {
  background: #fff2cc;
  color: #6b4e00;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 0;
  flex: 0 0 auto;
}

.action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 26px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: var(--field);
  color: var(--ink);
  text-decoration: none;
}

.action.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.table-wrap {
  overflow: hidden;
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}

.table-scroll {
  min-height: 0;
  overflow: auto;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-strong);
}

.toolbar strong {
  white-space: nowrap;
}

.hint {
  color: var(--muted);
  font-size: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1120px;
}

th,
td {
  padding: 5px 7px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--panel-strong);
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

th.sortable {
  cursor: pointer;
  user-select: none;
}

th.sortable button {
  appearance: none;
  border: 0;
  background: transparent;
  color: inherit;
  font: inherit;
  text-transform: inherit;
  padding: 0;
  cursor: pointer;
}

th.sortable button::after {
  content: "";
  display: inline-block;
  width: 0.8em;
  color: var(--accent);
}

th.sortable[aria-sort="ascending"] button::after {
  content: "^";
}

th.sortable[aria-sort="descending"] button::after {
  content: "v";
}

tbody tr {
  cursor: pointer;
}

tbody tr:hover,
tbody tr.selected {
  background: var(--accent-weak);
}

.name {
  max-width: 36vw;
  overflow-wrap: anywhere;
  font-weight: 600;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.flags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.flag {
  padding: 1px 4px;
  border-radius: 0;
  background: var(--panel-strong);
  color: #4b5563;
  font-size: 10px;
  white-space: nowrap;
}

.empty {
  padding: 36px 18px;
  color: var(--muted);
  text-align: center;
}

@media (max-width: 900px) {
  .shell {
    grid-template-columns: 1fr;
    height: auto;
  }

  .sidebar {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .main {
    grid-template-columns: 1fr;
    overflow: visible;
  }

  .preview {
    position: static;
  }

  .table-wrap {
    display: block;
  }

  .table-scroll {
    overflow: visible;
  }

  .name {
    max-width: none;
  }
}
</style>

<div class="shell">
  <aside class="sidebar">
    <h1 class="title">Media Test Videos</h1>
    <p class="subtitle">Fuzzy search the generated corpus and play a selected file.</p>

    <input id="search" class="search" type="search" autocomplete="off" placeholder="Search codec, size, pixel format, hdr...">

    <div class="controls">
      <div class="control">
        <label for="codec">Codec</label>
        <select id="codec" class="select"></select>
      </div>
      <div class="control">
        <label for="resolution">Resolution</label>
        <select id="resolution" class="select"></select>
      </div>
      <div class="control">
        <label for="container">Container</label>
        <select id="container" class="select"></select>
      </div>
      <div class="control">
        <label>Quick Filters</label>
        <div class="chips">
          <button id="hdrOnly" class="chip" type="button" aria-pressed="false">HDR</button>
          <button id="tenBitOnly" class="chip" type="button" aria-pressed="false">10+ bit</button>
          <button id="reset" class="chip" type="button" aria-pressed="false">Reset</button>
        </div>
      </div>
      <div class="control">
        <label>Playback</label>
        <div class="chips">
          <button id="loopToggle" class="chip" type="button" aria-pressed="false">Loop</button>
          <button id="autoplayToggle" class="chip" type="button" aria-pressed="false">Autoplay</button>
        </div>
      </div>
    </div>

    <div class="summary">
      <div class="metric"><strong id="shownCount">0</strong><span>shown</span></div>
      <div class="metric"><strong id="totalCount">0</strong><span>total</span></div>
      <div class="metric"><strong id="codecCount">0</strong><span>codecs</span></div>
      <div class="metric"><strong id="hdrCount">0</strong><span>HDR</span></div>
    </div>

    <div id="status" class="status">Loading video index...</div>
  </aside>

  <main class="main">
    <section class="preview">
      <div class="player">
        <video id="player" controls preload="metadata"></video>
      </div>
      <div class="details">
        <div class="details-head">
          <h2 id="selectedName">No video selected</h2>
          <div class="actions">
            <a id="openLink" class="action primary" href="#" target="_blank" rel="noopener">Open</a>
            <a id="downloadLink" class="action" href="#" download>Download</a>
          </div>
        </div>
        <div id="selectedTags" class="tags"></div>
      </div>
    </section>

    <section class="table-wrap">
      <div class="toolbar">
        <strong>Corpus</strong>
        <span class="hint">Rows update as you type. Click a row to preview.</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="file"><button type="button">Name</button></th>
              <th class="sortable" data-sort="source"><button type="button">Source</button></th>
              <th class="sortable" data-sort="codec"><button type="button">Codec</button></th>
              <th class="sortable" data-sort="profile"><button type="button">Profile</button></th>
              <th class="sortable" data-sort="resolution"><button type="button">Size</button></th>
              <th class="sortable" data-sort="pixelFormat"><button type="button">Format</button></th>
              <th class="sortable" data-sort="bitDepth"><button type="button">Depth</button></th>
              <th class="sortable" data-sort="colorPrimaries"><button type="button">Primaries</button></th>
              <th class="sortable" data-sort="colorMatrix"><button type="button">Matrix</button></th>
              <th class="sortable" data-sort="transferFunction"><button type="button">Transfer</button></th>
              <th class="sortable" data-sort="flagsText"><button type="button">Flags</button></th>
              <th class="sortable" data-sort="container"><button type="button">Container</button></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty" hidden>No videos match the current filters.</div>
      </div>
    </section>
  </main>
</div>

<script>
const mediaPattern = /(?:^|["'(<>\s])([^"'(<>\s]+\.(?:mp4|webm))(?:["')<>\s]|$)/gi;
const sourceCandidates = ["index.htmlk", "index.html", "./", "commands.sh"];

const state = {
  videos: [],
  filtered: [],
  selected: null,
  filters: {
    query: "",
    codec: "",
    resolution: "",
    container: "",
    hdrOnly: false,
    tenBitOnly: false,
  },
  playback: {
    loop: false,
    autoplay: false,
  },
  sort: {
    key: "file",
    direction: "asc",
  },
};

const els = {
  search: document.getElementById("search"),
  codec: document.getElementById("codec"),
  resolution: document.getElementById("resolution"),
  container: document.getElementById("container"),
  hdrOnly: document.getElementById("hdrOnly"),
  tenBitOnly: document.getElementById("tenBitOnly"),
  loopToggle: document.getElementById("loopToggle"),
  autoplayToggle: document.getElementById("autoplayToggle"),
  reset: document.getElementById("reset"),
  shownCount: document.getElementById("shownCount"),
  totalCount: document.getElementById("totalCount"),
  codecCount: document.getElementById("codecCount"),
  hdrCount: document.getElementById("hdrCount"),
  status: document.getElementById("status"),
  player: document.getElementById("player"),
  selectedName: document.getElementById("selectedName"),
  selectedTags: document.getElementById("selectedTags"),
  openLink: document.getElementById("openLink"),
  downloadLink: document.getElementById("downloadLink"),
  rows: document.getElementById("rows"),
  empty: document.getElementById("empty"),
  headers: [...document.querySelectorAll("th.sortable")],
};

function parseName(path) {
  const file = decodeURIComponent(path.split("/").pop());
  const container = file.split(".").pop().toLowerCase();
  const stem = file.slice(0, -(container.length + 1));
  const resolution = (stem.match(/(\d+x\d+)/) || [])[1] || "";
  const hdr = stem.startsWith("bt2111-") || /\b(hdr|pq|hlg|bt2020|smpte2084|arib-std-b67)\b/i.test(stem);
  const transfer = stem.includes("-pq-") ? "PQ" : stem.includes("-hlg-") ? "HLG" : "";
  const source = stem.startsWith("bt2111-") ? "BT.2111" :
    stem.startsWith("sdr-testsrc2-") ? "testsrc2" :
    stem.startsWith("sdr-rgbtestsrc-") ? "rgbtestsrc" :
    stem.startsWith("sdr-yuvtestsrc-") ? "yuvtestsrc" :
    stem.startsWith("sdr-smptehdbars-") ? "smptehdbars" : "";
  const profileMatch = stem.match(/-(baseline|main|high|profile[0-3])-/);
  const profile = profileMatch ? profileMatch[1].replace(/^profile/, "profile ") : "";
  const rotation = (stem.match(/-rotate(90|180|270)-/) || [])[1] || "";
  const alpha = stem.includes("-alpha-");

  const codecMap = [
    ["libvpx-vp9", "VP9"],
    ["libsvtav1", "AV1"],
    ["libaom-av1", "AV1"],
    ["libx264", "H.264"],
    ["libx265", "HEVC"],
    ["libvpx", "VP8"],
  ];
  const codec = (codecMap.find(([needle]) => stem.includes(needle)) || ["", "Unknown"])[1];
  const formatMatch = stem.match(/-(gbrp(?:10le|12le|14le|16le)?|rgb48le|rgba|yuva420p|yuv(?:420|422|440|444)p(?:10|12)?)(?=\.|$)/);
  const pixelFormat = formatMatch ? formatMatch[1] : "";
  const bitDepth = pixelFormat.includes("16") || pixelFormat === "rgb48le" ? 16 :
    pixelFormat.includes("14") ? 14 :
    pixelFormat.includes("12") ? 12 :
    pixelFormat.includes("10") ? 10 : 8;
  const colorPrimaries = hdr ? "BT.2020" : "BT.709";
  const colorMatrix = hdr ? "BT.2020nc" : "BT.709";
  const transferFunction = transfer || "BT.709";
  const flags = [
    hdr ? "HDR" : "",
    alpha ? "alpha" : "",
    rotation ? "rotate " + rotation : "",
  ].filter(Boolean);
  const flagsText = flags.join(" ");

  return {
    file,
    href: path,
    stem,
    container,
    source,
    resolution,
    codec,
    profile,
    pixelFormat,
    bitDepth,
    colorPrimaries,
    colorMatrix,
    transferFunction,
    hdr,
    transfer,
    alpha,
    rotation,
    flags,
    flagsText,
    haystack: [
      file,
      source,
      container,
      resolution,
      codec,
      profile,
      pixelFormat,
      bitDepth + "bit",
      colorPrimaries,
      colorMatrix,
      transferFunction,
      flagsText,
    ].join(" ").toLowerCase(),
  };
}

function extractMediaLinks(text, baseUrl) {
  const links = new Set();
  try {
    const doc = new DOMParser().parseFromString(text, "text/html");
    doc.querySelectorAll("a[href], source[src], video[src]").forEach((node) => {
      const raw = node.getAttribute("href") || node.getAttribute("src");
      if (raw && /\.(mp4|webm)(?:$|[?#])/i.test(raw)) {
        links.add(new URL(raw, baseUrl).pathname.split("/").pop());
      }
    });
  } catch (_) {}

  for (const match of text.matchAll(mediaPattern)) {
    links.add(match[1].split("/").pop());
  }

  return [...links].filter((link) => /\.(mp4|webm)$/i.test(link));
}

async function fetchIndex() {
  const errors = [];
  for (const candidate of sourceCandidates) {
    try {
      const response = await fetch(candidate, { cache: "no-store" });
      if (!response.ok) {
        errors.push(candidate + " " + response.status);
        continue;
      }
      const text = await response.text();
      const links = extractMediaLinks(text, response.url);
      if (links.length) {
        return { source: candidate, links };
      }
      errors.push(candidate + " had no media links");
    } catch (error) {
      errors.push(candidate + " failed");
    }
  }
  throw new Error(errors.join("; "));
}

function uniqueSorted(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => {
    const na = Number((a.match(/^\d+/) || [])[0]);
    const nb = Number((b.match(/^\d+/) || [])[0]);
    if (na && nb) return na - nb;
    return a.localeCompare(b, undefined, { numeric: true });
  });
}

function fillSelect(select, values, label) {
  select.innerHTML = "";
  const all = document.createElement("option");
  all.value = "";
  all.textContent = "All " + label;
  select.append(all);
  values.forEach((value) => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.append(option);
  });
}

function fuzzyScore(query, target) {
  if (!query) return 1;
  const terms = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  let total = 0;
  for (const term of terms) {
    let ti = 0;
    let score = 0;
    let streak = 0;
    for (let qi = 0; qi < term.length; qi++) {
      const ch = term[qi];
      let found = false;
      while (ti < target.length) {
        if (target[ti] === ch) {
          streak += 1;
          score += 4 + streak;
          if (ti === 0 || /[-_\s.]/.test(target[ti - 1])) score += 3;
          ti += 1;
          found = true;
          break;
        }
        streak = 0;
        ti += 1;
      }
      if (!found) return 0;
    }
    if (target.includes(term)) score += 20;
    total += score / Math.max(1, target.length);
  }
  return total;
}

function sortValue(video, key) {
  if (key === "resolution") {
    const parts = video.resolution.split("x").map(Number);
    return parts.length === 2 ? parts[0] * parts[1] : 0;
  }
  return video[key] ?? "";
}

function compareVideos(a, b) {
  const { key, direction } = state.sort;
  const av = sortValue(a.video, key);
  const bv = sortValue(b.video, key);
  let result;
  if (typeof av === "number" && typeof bv === "number") {
    result = av - bv;
  } else {
    result = String(av).localeCompare(String(bv), undefined, { numeric: true, sensitivity: "base" });
  }
  if (result === 0) {
    result = a.video.file.localeCompare(b.video.file, undefined, { numeric: true, sensitivity: "base" });
  }
  return direction === "desc" ? -result : result;
}

function applyFilters() {
  const query = state.filters.query;
  state.filtered = state.videos
    .map((video) => ({ video, score: fuzzyScore(query, video.haystack) }))
    .filter(({ video, score }) => {
      if (query && !score) return false;
      if (state.filters.codec && video.codec !== state.filters.codec) return false;
      if (state.filters.resolution && video.resolution !== state.filters.resolution) return false;
      if (state.filters.container && video.container !== state.filters.container) return false;
      if (state.filters.hdrOnly && !video.hdr) return false;
      if (state.filters.tenBitOnly && video.bitDepth < 10) return false;
      return true;
    })
    .sort(compareVideos)
    .map(({ video }) => video);

  if (!state.selected || !state.filtered.some((video) => video.file === state.selected.file)) {
    state.selected = state.filtered[0] || null;
  }

  render();
}

function tag(text, className = "") {
  const node = document.createElement("span");
  node.className = "tag" + (className ? " " + className : "");
  node.textContent = text;
  return node;
}

function renderSelected() {
  const video = state.selected;
  els.selectedTags.innerHTML = "";
  if (!video) {
    els.player.removeAttribute("src");
    els.selectedName.textContent = "No video selected";
    els.openLink.removeAttribute("href");
    els.downloadLink.removeAttribute("href");
    return;
  }

  els.player.loop = state.playback.loop;
  els.player.autoplay = state.playback.autoplay;
  if (els.player.getAttribute("src") !== video.href) {
    els.player.src = video.href;
    if (state.playback.autoplay) {
      els.player.play().catch(() => {});
    }
  }
  els.selectedName.textContent = video.file;
  els.openLink.href = video.href;
  els.downloadLink.href = video.href;
  els.downloadLink.download = video.file;

  [
    video.source,
    video.codec,
    video.profile,
    video.resolution,
    video.pixelFormat,
    video.bitDepth + "-bit",
    video.colorPrimaries,
    video.colorMatrix,
    video.transferFunction,
    video.container,
    ...video.flags,
  ].filter(Boolean).forEach((value) => els.selectedTags.append(tag(value, value === "HDR" ? "hdr" : "")));
}

function renderRows() {
  els.rows.innerHTML = "";
  const fragment = document.createDocumentFragment();
  state.filtered.forEach((video) => {
    const row = document.createElement("tr");
    row.className = state.selected && state.selected.file === video.file ? "selected" : "";
    row.innerHTML = `
      <td class="name">${video.file}</td>
      <td>${video.source || "-"}</td>
      <td>${video.codec}${video.hdr ? " <span class=\"tag hdr\">HDR</span>" : ""}</td>
      <td class="mono">${video.profile || "-"}</td>
      <td class="mono">${video.resolution || "-"}</td>
      <td class="mono">${video.pixelFormat || "-"}</td>
      <td class="mono">${video.bitDepth}</td>
      <td class="mono">${video.colorPrimaries}</td>
      <td class="mono">${video.colorMatrix}</td>
      <td class="mono">${video.transferFunction}</td>
      <td><span class="flags">${video.flags.map((flag) => `<span class="flag">${flag}</span>`).join("") || "-"}</span></td>
      <td class="mono">${video.container}</td>
    `;
    row.addEventListener("click", () => {
      state.selected = video;
      render();
    });
    fragment.append(row);
  });
  els.rows.append(fragment);
  els.empty.hidden = state.filtered.length !== 0;
}

function renderMetrics() {
  els.shownCount.textContent = state.filtered.length;
  els.totalCount.textContent = state.videos.length;
  els.codecCount.textContent = uniqueSorted(state.videos.map((video) => video.codec)).length;
  els.hdrCount.textContent = state.videos.filter((video) => video.hdr).length;
}

function render() {
  els.hdrOnly.setAttribute("aria-pressed", String(state.filters.hdrOnly));
  els.tenBitOnly.setAttribute("aria-pressed", String(state.filters.tenBitOnly));
  els.loopToggle.setAttribute("aria-pressed", String(state.playback.loop));
  els.autoplayToggle.setAttribute("aria-pressed", String(state.playback.autoplay));
  els.player.loop = state.playback.loop;
  els.player.autoplay = state.playback.autoplay;
  els.headers.forEach((header) => {
    const active = header.dataset.sort === state.sort.key;
    header.setAttribute("aria-sort", active ? (state.sort.direction === "asc" ? "ascending" : "descending") : "none");
  });
  renderMetrics();
  renderSelected();
  renderRows();
}

function bindControls() {
  els.search.addEventListener("input", () => {
    state.filters.query = els.search.value;
    applyFilters();
  });
  els.codec.addEventListener("change", () => {
    state.filters.codec = els.codec.value;
    applyFilters();
  });
  els.resolution.addEventListener("change", () => {
    state.filters.resolution = els.resolution.value;
    applyFilters();
  });
  els.container.addEventListener("change", () => {
    state.filters.container = els.container.value;
    applyFilters();
  });
  els.hdrOnly.addEventListener("click", () => {
    state.filters.hdrOnly = !state.filters.hdrOnly;
    applyFilters();
  });
  els.tenBitOnly.addEventListener("click", () => {
    state.filters.tenBitOnly = !state.filters.tenBitOnly;
    applyFilters();
  });
  els.loopToggle.addEventListener("click", () => {
    state.playback.loop = !state.playback.loop;
    render();
  });
  els.autoplayToggle.addEventListener("click", () => {
    state.playback.autoplay = !state.playback.autoplay;
    if (state.playback.autoplay && state.selected) {
      els.player.play().catch(() => {});
    }
    render();
  });
  els.reset.addEventListener("click", () => {
    state.filters = { query: "", codec: "", resolution: "", container: "", hdrOnly: false, tenBitOnly: false };
    els.search.value = "";
    els.codec.value = "";
    els.resolution.value = "";
    els.container.value = "";
    applyFilters();
  });
  els.headers.forEach((header) => {
    header.addEventListener("click", () => {
      const key = header.dataset.sort;
      state.sort = {
        key,
        direction: state.sort.key === key && state.sort.direction === "asc" ? "desc" : "asc",
      };
      applyFilters();
    });
  });
}

async function init() {
  bindControls();
  try {
    const { source, links } = await fetchIndex();
    state.videos = uniqueSorted(links).map(parseName);
    fillSelect(els.codec, uniqueSorted(state.videos.map((video) => video.codec)), "codecs");
    fillSelect(els.resolution, uniqueSorted(state.videos.map((video) => video.resolution)), "sizes");
    fillSelect(els.container, uniqueSorted(state.videos.map((video) => video.container)), "containers");
    els.status.textContent = "Loaded " + state.videos.length + " videos from " + source + ".";
    els.status.className = "status ok";
    applyFilters();
  } catch (error) {
    els.status.textContent = "Could not fetch a video index. Serve this directory over HTTP so the page can fetch index.htmlk, index.html, ./, or commands.sh. " + error.message;
    els.status.className = "status warn";
    render();
  }
}

init();
</script>
</html>
